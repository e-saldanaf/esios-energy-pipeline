name: daily-pipeline

on:
  workflow_dispatch:
    inputs:
      extract_start:
        description: "Start date (yyyy-mm-dd). Leave empty for automatic mode (D-2)."
        required: false
      extract_end:
        description: "End date (yyyy-mm-dd). Leave empty for automatic mode (today)."
        required: false
  schedule:
    - cron: "23 6 * * *"

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      LOG_FORMAT: json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -q

      - name: Extract & merge into raw
        env:
          ESIOS_API_TOKEN: ${{ secrets.ESIOS_API_TOKEN }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          EXTRACT_START: ${{ inputs.extract_start }}
          EXTRACT_END: ${{ inputs.extract_end }}
        run: python -m extract.main

      - name: dbt build (run + test)
        if: vars.DBT_ENABLED == 'true'
        working-directory: dbt
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          dbt deps
          dbt build --profiles-dir .

      - name: Generate dbt docs
        if: vars.DBT_ENABLED == 'true'
        working-directory: dbt
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: dbt docs generate --profiles-dir . --static

      - name: Upload docs artifact
        if: vars.DBT_ENABLED == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dbt/target

      - name: Keepalive commit
        run: |
          mkdir -p .github
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/last_run.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/last_run.txt
          git commit -m "chore: pipeline keepalive" || echo "nothing to commit"
          git push

  deploy-docs:
    if: vars.DBT_ENABLED == 'true'
    needs: pipeline
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy dbt docs to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4